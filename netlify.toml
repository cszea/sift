# Netlify configuration for REEL·bank
# Static site (index.html at root) + one serverless function backed by Netlify Blobs.

[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# The api function declares `config.path = "/api/*"` and handles all routes
# (login, me, state, import, users). No manual redirects needed.
